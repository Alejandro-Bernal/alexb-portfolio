name: Validate PR Source to Main

on:
    pull_request:
        branches:
            - main

jobs:
    validate-source:
        runs-on: ubuntu-latest
        steps:
            - name: Check PR source branch
              run: |
                  SOURCE_BRANCH="${{ github.head_ref }}"

                  if [[ "$SOURCE_BRANCH" == "staging" || "$SOURCE_BRANCH" == hotfix/* ]]; then
                    echo "✅ Allowed: PR is coming from '$SOURCE_BRANCH'"
                  else
                    echo "❌ ERROR: Pull requests to main are only allowed from 'staging' or branches starting with 'hotfix/'"
                    echo "Current source branch: $SOURCE_BRANCH"
                    exit 1
                  fi
